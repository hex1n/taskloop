name: provider-contract

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  provider:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022, windows-2025]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Runtime
        run: node --version
      - name: Source help
        run: node bin/workloop.mjs help
      - name: Provider authority suite
        run: npm test
      - name: Ticket acceptance suite
        run: node tests/verify-provider-tickets.mjs
