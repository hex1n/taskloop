name: multi-root-authority-spike

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: ubuntu-latest
            node: 22
          - runner: ubuntu-latest
            platform: ubuntu-latest
            node: 24
          - runner: macos-latest
            platform: macos-latest
            node: 22
          - runner: macos-latest
            platform: macos-latest
            node: 24
          - runner: windows-2022
            platform: windows-2022
            node: 22
          - runner: windows-2022
            platform: windows-2022
            node: 24
          - runner: windows-2025
            platform: windows-2025
            node: 22
          - runner: windows-2025
            platform: windows-2025
            node: 24
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      WORKLOOP_SPIKE_CAPABILITY_MATRIX: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run authority mechanism adapter
        run: node --test tests/multi-root-authority-adapter.test.mjs tests/multi-root-authority-receipt.test.mjs
      - name: Write exact-SHA receipt
        env:
          WORKLOOP_SPIKE_PLATFORM: ${{ matrix.platform }}
        run: node spikes/multi-root-authority/receipt-cli.mjs write --output "${{ runner.temp }}/workloop-spike-receipt"
      - name: Upload cell receipt
        uses: actions/upload-artifact@v4
        with:
          name: multi-root-authority-${{ matrix.platform }}-node-${{ matrix.node }}
          path: ${{ runner.temp }}/workloop-spike-receipt/*.json
          if-no-files-found: error

  proof:
    needs: spike
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all cell receipts
        uses: actions/download-artifact@v4
        with:
          pattern: multi-root-authority-*
          path: ${{ runner.temp }}/workloop-spike-receipts
          merge-multiple: true
      - name: Aggregate and validate eight cells
        run: node spikes/multi-root-authority/receipt-cli.mjs aggregate --input "${{ runner.temp }}/workloop-spike-receipts" --output "${{ runner.temp }}/multi-root-authority-proof.json"
      - name: Attest aggregate proof
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/multi-root-authority-proof.json
      - name: Upload aggregate proof
        uses: actions/upload-artifact@v4
        with:
          name: multi-root-authority-proof-${{ github.sha }}
          path: ${{ runner.temp }}/multi-root-authority-proof.json
          if-no-files-found: error
